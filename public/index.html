<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Görüntülü Görüşme</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="videoArea">

    <video
        id="remoteVideo"
        autoplay
        playsinline>
    </video>

    <video
        id="myVideo"
        autoplay
        muted
        playsinline>
    </video>

</div>

<div id="chatPanel">

    <div id="messages"></div>

    <div id="inputArea">
        <input
            id="messageInput"
            type="text"
            placeholder="Mesaj yaz...">

        <button id="sendBtn">
            Gönder
        </button>
    </div>

</div>

<button id="chatToggle">
💬
</button>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
