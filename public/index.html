<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORGOR</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ODAYA GİRİŞ -->
    <div id="roomScreen">
        <h2>Odaya Katıl</h2>
        <input id="roomName" placeholder="Oda adı">
        <input id="roomPassword" type="password" placeholder="Oda şifresi">
        <button id="joinBtn">Odaya Gir</button>
    </div>

    <!-- ANA EKRAN -->
    <div id="mainScreen">
        <video id="remoteVideo" autoplay playsinline></video>

        <!-- KÜÇÜK KAMERA KONTEYNERİ - YENİ -->
        <div id="myVideoContainer">
            <video id="myVideo" autoplay playsinline muted></video>
            <button id="switchCameraBtn" class="cameraOverlayBtn">🔄</button>
            <button id="fullscreenBtn" class="cameraOverlayBtn">⛶</button>
            <select id="qualitySelect" class="qualitySelect">
                <option value="360">360p</option>
                <option value="480">480p</option>
                <option value="720" selected>720p</option>
                <option value="1080">1080p</option>
            </select>
        </div>

        <!-- SOL ÜST AYARLAR -->
        <div id="settingsContainer">
            <button id="settingsBtn">⚙</button>
            <button id="micBtn">🎤</button>
            <button id="camBtn">📷</button>
            <button id="soundBtn">🔊</button>
            <button id="shareScreenBtn">📺</button>
            <button id="changePasswordBtn">🔐</button>

            <div id="statusBar">
                <div class="statusBox">
                    Ping: <span id="pingValue">-</span>
                </div>
                <div class="statusBox">
                    Bağlantı: <span id="connectionQuality">-</span>
                </div>
            </div>
        </div>

        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.1">

        <!-- SOHBET -->
        <button id="chatToggle">💬</button>
        <div id="chatPanel">
            <div id="messages"></div>
            <div id="inputArea">
                <button id="mediaBtn">📎</button>
                <input id="mediaInput" type="file" accept="image/*,video/*,audio/*" style="display:none">
                <input id="messageInput" placeholder="Mesaj yaz...">
                <button id="sendBtn">Gönder</button>
            </div>
        </div>

        <!-- MEDYA ÖNİZLEME - YENİ -->
        <div id="mediaPreview">
            <span id="closePreview">✖</span>
            <img id="previewImg">
            <video id="previewVideo" controls></video>
            <button id="downloadMediaBtn">İndir</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
