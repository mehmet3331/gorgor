<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORGOR</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ODAYA GİRİŞ -->
    <div id="roomScreen">
        <h2>Odaya Katıl</h2>
        <input id="roomName" placeholder="Oda adı" aria-label="Oda adı">
        <input id="roomPassword" type="password" placeholder="Oda şifresi" aria-label="Oda şifresi">
        <button id="joinBtn">Odaya Gir</button>
    </div>

    <!-- ANA EKRAN -->
    <div id="mainScreen">
        <video id="remoteVideo" autoplay playsinline webkit-playsinline></video>

        <!-- KÜÇÜK KAMERA KONTEYNERİ -->
        <div id="myVideoContainer">
            <video id="myVideo" autoplay playsinline webkit-playsinline muted></video>
            <button id="switchCameraBtn" class="cameraOverlayBtn" aria-label="Kamerayı değiştir">🔄</button>
            <button id="fullscreenBtn" class="cameraOverlayBtn" aria-label="Tam ekran">⛶</button>
            <select id="qualitySelect" class="qualitySelect" aria-label="Görüntü kalitesi">
                <option value="360">360p</option>
                <option value="480">480p</option>
                <option value="720" selected>720p</option>
                <option value="1080">1080p</option>
            </select>
        </div>

        <!-- SOL ÜST AYARLAR -->
        <div id="settingsContainer">
            <button id="settingsBtn" aria-label="Ayarlar">⚙</button>
            <button id="micBtn" aria-label="Mikrofon">🎤</button>
            <button id="camBtn" aria-label="Kamera">📷</button>
            <button id="soundBtn" aria-label="Ses">🔊</button>
            <button id="shareScreenBtn" aria-label="Ekran paylaş">📺</button>
            <button id="changePasswordBtn" aria-label="Şifre değiştir">🔐</button>
            <button id="lightModeBtn" aria-label="Gece/Gündüz">💡</button>

            <div id="statusBar">
                <div class="statusBox">
                    Ping: <span id="pingValue">-</span>
                </div>
                <div class="statusBox">
                    Bağlantı: <span id="connectionQuality">-</span>
                </div>
            </div>
        </div>

        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.1" aria-label="Ses seviyesi">

        <!-- SOHBET -->
        <button id="chatToggle" aria-label="Sohbeti aç">💬</button>
        <div id="chatPanel">
            <div id="messages"></div>
            <div id="inputArea">
                <button id="mediaBtn" aria-label="Dosya ekle">📎</button>
                <button id="locationBtn" aria-label="Konum gönder">📍</button>
                <input id="mediaInput" type="file" accept="image/*,video/*,audio/*" style="display:none" aria-label="Medya dosyası seç">
                <input id="messageInput" placeholder="Mesaj yaz..." aria-label="Mesaj">
                <button id="nudgeBtn" title="Dürt">👉</button>
                <button id="emojiBtn" aria-label="Emoji">😂</button>
                <button id="sendBtn" aria-label="Gönder">Gönder</button>
            </div>
            <div id="emojiPanel">
                <span class="flyEmoji" data-effect="heart">❤</span>
                <span class="flyEmoji" data-effect="kiss">😘</span>
                <span class="flyEmoji" data-effect="laugh">😂</span>
                <span class="flyEmoji" data-effect="thumbs">👍</span>
                <span class="flyEmoji" data-effect="cry">😢</span>
                <span class="flyEmoji" data-effect="wow">😮</span>
                <span class="flyEmoji" data-effect="flower">🌸</span>
                <span class="flyEmoji" data-effect="fire">🔥</span>
                <span class="flyEmoji" data-effect="love">😍</span>
                <span class="flyEmoji" data-effect="hug">🫶</span>
            </div>
        </div>

        <!-- MEDYA ÖNİZLEME -->
        <div id="mediaPreview">
            <span id="closePreview" aria-label="Önizlemeyi kapat">✖</span>
            <img id="previewImg" alt="Medya önizleme">
            <video id="previewVideo" controls></video>
            <button id="downloadMediaBtn" aria-label="Medyayı indir">İndir</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
